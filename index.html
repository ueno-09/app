<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私の最初のホームページ</title>
    <style>
        /* 全体の背景色と文字色の設定 */
        body {
            background-color: #e0f7fa; /* 薄い青色 */
            color: #333333;            /* 濃い灰色 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* プロフィールカードのスタイル */
        .profile-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        /* 見出しのスタイル */
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #b2ebf2;
            padding-bottom: 10px;
        }

        /* 各項目のスタイル */
        .info-item {
            margin-bottom: 15px;
        }

        .label {
            font-weight: bold;
            display: inline-block;
            width: 100px;
        }

        /* 趣味のリストスタイル */
        ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>ようこそ!</h1>
        
        <div class="info-item">
            <span class="label">名前:</span>
            <span>[自分の名前に置き換える]</span>
        </div>
        
        <div class="info-item">
            <span class="label">学部学科:</span>
            <span>[自分の学部学科に置き換える]</span>
        </div>
        
        <div class="info-item">
            <span class="label">趣味:</span>
            <ul>
                <li>[自分の趣味1]</li>
                <li>[自分の趣味2]</li>
                <li>[自分の趣味3]</li>
            </ul>
        </div>
    </div>

</body>
</html>
